<!DOCTYPE html>
<html>
<head>
<title>Dreams Summary</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#1b2a4a,#0b162b);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
width:800px;
background:#0e1a32;
padding:40px;
border-radius:18px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#343a6b;
padding:18px;
}

td{
padding:18px;
border-top:1px solid rgba(255,255,255,0.05);
}

</style>
</head>

<body>

<div class="container">

<a href="index.html" style="color:white;">⬅ Back to Home</a>

<h1 style="text-align:center;">Dreams Summary</h1>

<table>

<tr>
<th>Dream Type</th>
<th>Total Count</th>
</tr>

<tr>
<td>Good Dreams</td>
<td id="goodCount">0</td>
</tr>

<tr>
<td>Bad Dreams</td>
<td id="badCount">0</td>
</tr>

<tr>
<td>Total Dreams</td>
<td id="totalCount">0</td>
</tr>

</table>

</div>

<script>

function calculateSummary(){

const rows=document.querySelectorAll("#dreamTable tr");

let good=0;
let bad=0;

rows.forEach((row,index)=>{

if(index===0)return;

const type=row.cells[2].innerText;

if(type==="Good")good++;
if(type==="Bad")bad++;

});

document.getElementById("goodCount").innerText=good;
document.getElementById("badCount").innerText=bad;
document.getElementById("totalCount").innerText=good+bad;

}

</script>

</body>
</html>
