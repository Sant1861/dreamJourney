<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dream Portal</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#1b2a4a,#0b162b);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.card{
background:#0e1a32;
padding:60px;
border-radius:20px;
text-align:center;
width:450px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

h1{
font-size:36px;
margin:10px 0;
}

.subtitle{
color:#a9b3c7;
margin-bottom:30px;
}

.stats{
display:flex;
justify-content:center;
gap:60px;
margin-bottom:30px;
}

.number{
font-size:32px;
color:#6c7bff;
font-weight:bold;
}

.label{
font-size:14px;
color:#a9b3c7;
}

.button{
display:inline-block;
margin:10px;
background:#5f6cff;
color:white;
padding:16px 40px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

.button:hover{
background:#7a86ff;
}

</style>
</head>

<body>

<div class="card">

<div style="font-size:40px;">✨</div>

<h1>Dream Portal</h1>

<p class="subtitle">Explore your dream journey</p>

<div class="stats">

<div>
<div class="number">10</div>
<div class="label">Dreams</div>
</div>

<div>
<div class="number">7</div>
<div class="label">Days</div>
</div>

</div>

<a class="button" href="dreams-diary.html">MY DREAMS</a>

<br>

<a class="button" href="dreams-total.html">VIEW SUMMARY</a>

</div>

</body>
</html>
