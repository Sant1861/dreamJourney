<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dreams Diary</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#1b2a4a,#0b162b);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
width:950px;
background:#0e1a32;
padding:40px;
border-radius:18px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

h1{
text-align:center;
font-size:38px;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#343a6b;
padding:18px;
text-align:left;
}

td{
padding:18px;
border-top:1px solid rgba(255,255,255,0.05);
}

button{
padding:8px 14px;
margin:5px;
border:none;
border-radius:6px;
background:#6c7bff;
color:white;
cursor:pointer;
}

input,select{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

</style>
</head>

<body>

<div class="container">

<a href="index.html" style="color:white;">⬅ Back to Home</a>

<h1>Dreams Diary</h1>

<div>

<input id="dreamName" placeholder="Dream name">

<select id="dreamType">
<option>Good</option>
<option>Bad</option>
</select>

<button onclick="addDream()">Add Dream</button>

</div>

<div style="margin-top:10px;">

<button onclick="filterDreams('All')">All</button>
<button onclick="filterDreams('Good')">Good</button>
<button onclick="filterDreams('Bad')">Bad</button>

</div>

<table id="dreamTable">

<tr>
<th>Dream Name</th>
<th>Days Ago</th>
<th>Dream Type</th>
</tr>

<tr>
<td>Flying over mountains</td>
<td>1 day ago</td>
<td>Good</td>
</tr>

<tr>
<td>Lost in maze</td>
<td>2 days ago</td>
<td>Bad</td>
</tr>

<tr>
<td>Winning lottery</td>
<td>4 days ago</td>
<td>Good</td>
</tr>

</table>

</div>

<script>

function addDream(){

const name=document.getElementById("dreamName").value;
const type=document.getElementById("dreamType").value;

const table=document.getElementById("dreamTable");

const row=table.insertRow(-1);

row.insertCell(0).innerText=name;
row.insertCell(1).innerText="Today";
row.insertCell(2).innerText=type;

}

function filterDreams(type){

const rows=document.querySelectorAll("#dreamTable tr");

rows.forEach((row,index)=>{

if(index===0)return;

const dreamType=row.cells[2].innerText;

if(type==="All"||dreamType===type)
row.style.display="";
else
row.style.display="none";

});

}

</script>

</body>
</html>
